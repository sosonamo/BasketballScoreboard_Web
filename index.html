<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basketball Scoreboard</title>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: 'Pretendard', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 50px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .selection-container {
            display: flex;
            gap: 30px;
        }

        .card {
            background-color: #1e1e1e;
            border: 2px solid #333;
            border-radius: 20px;
            padding: 40px;
            width: 250px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: #ff6b00;
            box-shadow: 0 10px 30px rgba(255, 107, 0, 0.2);
        }

        .card h2 {
            font-size: 2rem;
            margin-bottom: 15px;
            color: #ff6b00;
        }

        .card p {
            color: #aaa;
            line-height: 1.5;
        }

        .badge {
            display: inline-block;
            background: linear-gradient(45deg, #ff6b00, #ffbb00);
            color: black;
            padding: 5px 10px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 0.8rem;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <h1>BASKETBALL SCOREBOARD</h1>

    <div class="selection-container">

        <a href="basic.html" class="card">
            <div class="badge">Free</div>
            <h2>BASIC</h2>
            <p>농구 점수판의<br>핵심 기능만 담은 기본 모드</p>
        </a>

        <a href="pro.html" class="card">
            <div class="badge">Subscribe</div>
            <h2>PRO</h2>
            <p>선수별 데이터 관리가<br>가능한 디테일 모드</p>
        </a>
        
    </div>

</body>
</html>
