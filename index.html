<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basketball Scoreboard</title>
    <script type="module" src="firebaseConfig.js"></script>
    <style>
        body { display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0;
            background-color: #121212; color: white; font-family: 'Pretendard', sans-serif; }

        h1 { font-size: 3rem; margin-bottom: 50px; text-shadow: 0 0 10px rgba(255, 255, 255, 0.3); }

        .selection-container { display: flex; gap: 30px; }

        .card {
            width: 250px; background-color: #1e1e1e; border: 2px solid #333; border-radius: 20px;
            padding: 40px; margin-bottom: 30; cursor: pointer;
            text-align: center; transition: all 0.3s ease; text-decoration: none; color: inherit;
        }

        .card:hover { border-color: #ff6b00; box-shadow: 0 10px 30px rgba(255, 107, 0, 0.2);
            transform: translateY(-10px); }

        .card h2 { font-size: 2rem; color: #ff6b00; margin-bottom: 15px; }

        .card p { color: #aaa; line-height: 1.5; }

        .badge { display: inline-block; background: linear-gradient(45deg, #ff6b00, #ffbb00); color: black;
            border-radius: 5px; margin-bottom: 10px; padding: 5px 10px;
            font-size: 0.8rem; font-weight: bold; }

        .login-container { display: flex; margin-top: 50px; gap: 15px; 
            justify-content: center; align-items: stretch; }
        .login-btn { width: 80px; background: #333; color: #fff; border: 1px solid #444;
            padding: 10px; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .login-btn.plus:hover { background: #555; }
        
    </style>
</head>

<body>
    <div id="app">
        <h1>BASKETBALL SCOREBOARD</h1>

        <div class="selection-container">
            <div class="card" @click="checkAccess('basic')">
                <div class="badge">Free</div>
                <h2>BASIC</h2>
                <p>팀별 데이터의 기본 모드</p>
            </div>

            <div class="card" @click="checkAccess('pro')">
                <div class="badge">Subscribe</div>
                <h2>PRO</h2>
                <p>선수별 데이터의 디테일 모드</p>
            </div>
        </div>

        <div class="login-container">
            <template v-if="!isLoggedIn">
                <div style="display: flex; flex-direction: column; gap: 8px;">
                    <input type="text" v-model="teamId" style="width: 150px; padding: 8px;" placeholder="팀 이름 (ID)">
                    <input type="password" v-model="teamPassword" style="width: 150px; padding: 8px;" placeholder="비밀번호">
                </div>
                <div style="display: flex;">
                    <button class="login-btn" @click="handleLogin">Login</button>
                </div>
            </template>

            <div v-else style="text-align: center; width: 100%; animation: fadeIn 0.5s;">
                <h3 style="margin: 0; color: #f39c12;">안녕하세요, {{ teamId }}님!</h3>
                <p style="margin: 5px 0 0; font-size: 0.9em; color: #ccc;">원하시는 모드 카드를 클릭해 주세요.</p>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

    <script>
        const { createApp } = Vue;

        createApp({
            data() {
                return {
                    isLoggedIn: false, // 로그인 상태값
                    teamId: '',        // 입력받은 ID
                    teamPassword: ''   // 입력받은 비밀번호
                }
            },
            methods: {
                // [Login] 버튼을 눌렀을 때
                handleLogin() {
                    if (!this.teamId || !this.teamPassword) {
                        alert("팀 이름과 비밀번호를 입력해주세요!");
                        return;
                    }
                    // 성공 처리 (박스 내부가 바뀜)
                    this.isLoggedIn = true;
                    console.log("로그인 성공:", this.teamId);
                },

                // 카드를 눌렀을 때 (로그인 체크 문지기)
                checkAccess(mode) {
                    if (!this.isLoggedIn) {
                        alert("로그인을 먼저 해주세요!");
                        return;
                    }

                    // 로그인 된 상태라면 이동
                    const targetPage = mode === 'pro' ? 'pro.html' : 'basic.html';
                    const url = `${targetPage}?teamId=${encodeURIComponent(this.teamId)}&pw=${encodeURIComponent(this.teamPassword)}`;
                    location.href = url;
                }
            }
        }).mount('#app');
    </script>

    <style>
        /* 부드러운 전환을 위한 애니메이션 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</body>
</html>
