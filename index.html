<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basketball Scoreboard</title>
    <script type="module" src="firebaseConfig.js"></script>
    <style>
        body { display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0;
            background-color: #121212; color: white; font-family: 'Pretendard', sans-serif; }

        h1 { font-size: 3rem; margin-bottom: 50px; text-shadow: 0 0 10px rgba(255, 255, 255, 0.3); }

        .selection-container { display: flex; gap: 30px; }

        .card {
            width: 250px; background-color: #1e1e1e; border: 2px solid #333; border-radius: 20px;
            padding: 40px; margin-bottom: 30; cursor: pointer;
            text-align: center; transition: all 0.3s ease; text-decoration: none; color: inherit;
        }

        .card:hover { border-color: #ff6b00; box-shadow: 0 10px 30px rgba(255, 107, 0, 0.2);
            transform: translateY(-10px); }

        .card h2 { font-size: 2rem; color: #ff6b00; margin-bottom: 15px; }

        .card p { color: #aaa; line-height: 1.5; }

        .badge { display: inline-block; background: linear-gradient(45deg, #ff6b00, #ffbb00); color: black;
            border-radius: 5px; margin-bottom: 10px; padding: 5px 10px;
            font-size: 0.8rem; font-weight: bold; }
        
        .btn-group { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-top: 10px; }
        .standard-btn { width: 50px; background: #333; color: #fff; border: 1px solid #444;
            padding: 8px 12px; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .standard-btn.plus:hover { background: #555; }
    </style>
</head>

<body>
    <h1>BASKETBALL SCOREBOARD</h1>

    <div class="selection-container">

        <div class="card" onclick="login('basic')">
            <div class="badge">Free</div>
            <h2>BASIC</h2>
            <p>농구 점수판의<br>핵심 기능만 담은 기본 모드</p>
        </div>

        <div class="card" onclick="login('pro')">
            <div class="badge">Subscribe</div>
            <h2>PRO</h2>
            <p>선수별 데이터 관리가<br>가능한 디테일 모드</p>
        </div>
        
    </div>

    <div class="login-box">
        <input type="text" id="teamName" placeholder="팀 이름 (ID)">
        <input type="password" id="teamPass" placeholder="비밀번호">
        <button class="standard-btn" onclick="login()">기록 시작하기</button>
    </div>


    <script>
        let selectedMode = 'basic'; // 기본값

        // 카드를 클릭했을 때 어떤 모드인지 저장하는 함수
        function setMode(mode) {
            selectedMode = mode;
            // 시각적 피드백을 위해 알림을 주거나 카드 테두리를 강조할 수 있습니다.
            console.log("선택된 모드: " + mode);
        }

        function login(mode) {
            const teamId = document.getElementById('teamName').value;
            const password = document.getElementById('teamPass').value;
    
            if (!teamId || !password) {
                alert("팀 이름과 비밀번호는 필수입니다!");
                return;
            }
    
            // 선택한 모드(basic 또는 pro)에 따라 이동하면서 주소창에 정보 전달
            const targetPage = mode === 'pro' ? 'pro.html' : 'basic.html';
            
            // encodeURIComponent는 한글 팀명 등이 깨지지 않게 해줍니다.
            location.href = `${targetPage}?teamId=${encodeURIComponent(teamId)}&pw=${encodeURIComponent(password)}`;
        }
    </script>

</body>
</html>
