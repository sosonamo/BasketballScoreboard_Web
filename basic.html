<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>농구 점수판 Basic</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

    <style>
        /* 기본 설정 */
        body { background-color: #121212; margin: 0; padding: 5px; user-select: none;
            font-family: 'Arial', sans-serif;  color: white; }
        .container { max-width: 1000px; margin: 0 auto; display: flex; flex-direction: column; gap: 10px; padding-bottom: 50px;}
        .context-label { font-size: 0.7rem; color: #888; font-weight: bold; margin-bottom: 5px; }
        .danger-text {color: #ff3333; text-shadow: 0 0 10px rgba(255, 51, 51, 0.5); }

        /* Button Standard */
        /*button { cursor: pointer; border: none; border-radius: 4px; font-weight: bold; color: white;
            touch-action: manipulation; transition: 0.2s; }
        .btn-sm { padding: 5px 10px; font-size: 0.8rem; }
        .btn-md { padding: 10px; font-size: 1rem; }
        button:active { transform: scale(0.92); }*/
        .btn-group { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-top: 10px; }
        .standard-btn { width: 50px; background: #333; color: #fff; border: 1px solid #444;
            padding: 8px 12px; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .standard-btn.plus:hover { background: #555; }
        
        /* 3분할 레이아웃 */
        .main-board {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            background: #1e1e1e;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #333;
            gap: 15px;
        }

        .side-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #252525;
            padding: 20px;
            border-radius: 12px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        .center-panel {
            flex: 1.3;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        /* ---  Side Panel --- */

        /* Team Name */
        .team-name-input { width: 100%; background: transparent; border: none; border-bottom: 2px solid #444;
            color: white; font-size: 1.5rem; font-weight: bold; text-align: center; margin-bottom: 0px; }
        
        /* Timeout */
        .timeout-section { display: flex; flex-direction: column; align-items: center;
            gap: 5px; margin-top: 30px; margin-bottom: 20px; }
        .timeout-dots { display: flex; gap: 8px; }
        .timeout-dot { width: 16px; height: 16px; background-color: #444; border-radius: 50%;
            cursor: pointer; transition: 0.2s; box-shadow: inset 0 0 5px rgba(0,0,0,0.5);}
        .timeout-dot.active { background-color: #ffeb3b;
            box-shadow: 0 0 10px #ffeb3b, inset 0 0 3px rgba(255,255,255,0.8); }

        /* Team Foul */
        .foul-section { text-align: center; margin-top: 35px; margin-bottom: 20px; }
        .foul-number { margin-top: 10px; margin-bottom: 0px;
            font-size: 4.0rem; font-weight: bold; min-width: 40px; transition: color 0.3s; }

        /* Team Score */
        .totalScore-section { text-align: center; align-items: center; margin-top: 40px; margin-bottom: 20px; }
        .totalScore-number { display: flex; justify-content: center; gap: 8px; margin-top: 20px; margin-bottom: 20px;
            font-size: 5rem; font-weight: bold; line-height: 1; }

        
        /* --- Center Panel --- */
        /* Title */
        .title-label { width: 100%; background: transparent; border: none; border-bottom: 0px solid #444;
            margin-top: 20px; margin-bottom: 10px;
            color: #ff9800; font-size: 1.5rem; font-weight: bold; text-align: center; }
        
        /* Quarter */
        .quarter-section { text-align: center; margin-top: 4px; margin-bottom: 19px; }
        .quarter-number { font-size: 1.5rem; font-weight: bold; color: white; }

        /* Game Clock */
        .gameClock-section { text-align: center; margin-top: 10px; margin-bottom: 20px; }
        .gameClock-number { margin-top: 15px; margin-bottom: 15px; cursor: pointer;
            font-size: 4.0rem; color: #00ff00; font-weight: bold; line-height: 1; }

        /* Shot Clock */
        .shotClock-section { text-align: center; margin-top: 20px; margin-bottom: 20px; }
        .shotClock-number { margin-top: 15px; margin-bottom: 10px; cursor: pointer; line-height: 1;
            font-size: 6.0rem; font-weight: bold; }
        .shotClock-danger { color: #ff0000 !important; }


        /* --- Under Control Bar (fixed) --- */
        .option-section { display: flex; position: fixed; bottom: 0; left: 0; width: 100%; background: #111; padding: 10px;
            justify-content: center; gap: 10px; border-top: 1px solid #333; }
        .option-btn { width: 100px; background: #333; border: none; border-radius: 4px; padding: 8px 12px;
            cursor: pointer; touch-action: manipulation; transition: 0.2s;
            font-size: 0.8rem; font-weight: bold; color: white;}

    </style>
</head>
<body>


<div id="app" class="container">
    
    <div class="main-board">

        <!-- Side Panel (Home) -->
        <div class="side-panel">
            
            <input v-model="teamA.name" class="team-name-input">

            <div class="timeout-section">
                <span class="context-label">TIMEOUT</span>
                <div class="timeout-dots">
                    <div v-for="n in 3" 
                         :key="n" 
                         class="timeout-dot"
                         :class="{ 'active': n <= teamA.timeout }"
                         @click="toggleTimeout('A', n)">
                    </div>
                </div>
            </div>

            <div class="foul-section">
                <div class="context-label">TEAM FOUL</div>
                <div class="foul-number" :class="{ 'danger-text': teamAFoul >= 4 }">{{ teamAFoul }}</div>
                <div class="btn-group">
                    <button class="standard-btn" @click="updateFoul('A', -1)">-1</button>
                    <button class="standard-btn" @click="updateFoul('A', 1)">+1</button>
                </div>
            </div>

            <div class="totalScore-section">
                <div class="context-label">TEAM SCORE</div>
                <div class="totalScore-number" style="color:#4fc3f7">{{ teamAScore }}</div>
                <div class="btn-group">
                    <button class="standard-btn" @click="updateScore('A', -1)">-1</button>
                    <button class="standard-btn plus" @click="updateScore('A', 1)">+1</button>
                    <button class="standard-btn plus" @click="updateScore('A', 2)">+2</button>
                    <button class="standard-btn plus" @click="updateScore('A', 3)">+3</button>
                </div>
            </div>
            
        </div>
            
        <!-- Center Panel -->
        <div class="center-panel">

            <div class="title-label">Basketball Scoreboard</div>

            <div class="quarter-section">
                <div class="context-label">QUARTER</div>
                <div class="quarter-number">{{ displayQuarter }}</div>
            </div>
            
            <div class="gameClock-section">
                <div class="context-label">GAME CLOCK</div>
                <div class="gameClock-number" @click="toggleGameClock">{{ formattedGameTime }}</div>
                <div class="btn-group">
                    <button class="standard-btn" @click="mdifityGameClock(-60)">-1m</button>
                    <button class="standard-btn" style="width: 80px;" @click="changeQuarter(-1)">Pre Q</button>
                    <button class="standard-btn" style="width: 80px;" @click="nextQuarter">Next Q</button>
                    <button class="standard-btn" @click="mdifityGameClock(60)">+1m</button>
                </div>
            </div>
            
            <div class="shotClock-section">
                <div class="context-label">SHOT CLOCK</div>
                <div class="shotClock-number" :class="{ 'danger-text': shotClock <= 5 }"
                    @click="toggleShotClock">{{ shotClock }}</div>
                <div class="btn-group">
                    <button class="standard-btn" @click="modifyShotClock(-1)">-1s</button>
                    <button class="standard-btn" style="background:#258325; width: 80px;"
                        @click="resetShotClock(24)">24</button>
                    <button class="standard-btn" style="background:#258325; width: 80px;"
                        @click="resetShotClock(14)">14</button>
                    <button class="standard-btn" @click="modifyShotClock(1)">+1s</button>
                </div>
            </div>
        </div>
    
        <!-- Side Panel (Away) -->
        <div class="side-panel">
            <input v-model="teamB.name" class="team-name-input">
            
            <div class="timeout-section">
                <span class="context-label">TIMEOUT</span>
                <div class="timeout-dots">
                    <div v-for="n in 3" 
                         :key="n" 
                         class="timeout-dot"
                         :class="{ 'active': n <= teamB.timeout }"
                         @click="toggleTimeout('B', n)">
                    </div>
                </div>
            </div>

            <div class="foul-section">
                <div class="context-label">TEAM FOUL</div>
                <div class="foul-number" :class="{ 'danger-text': teamBFoul >= 4 }">{{ teamBFoul }}</div>
                <div class="btn-group">
                    <button class="standard-btn" @click="updateFoul('B', -1)">-1</button>
                    <button class="standard-btn" @click="updateFoul('B', 1)">+1</button>
                </div>
            </div>

            <div class="totalScore-section">
                <div class="context-label">TEAM SCORE</div>
                <div class="totalScore-number" style="color:#ff8a65">{{ teamBScore }}</div>
                <div class="btn-group">
                    <button class="standard-btn" @click="updateScore('B', -1)">-1</button>
                    <button class="standard-btn plus" @click="updateScore('B', 1)">+1</button>
                    <button class="standard-btn plus" @click="updateScore('B', 2)">+2</button>
                    <button class="standard-btn plus" @click="updateScore('B', 3)">+3</button>
                </div>
            </div>
        </div>

    </div>

    <!-- Option Bar (under) -->
    <div style="height:50px;"></div>
    <div class="option-section">
        <button class="option-btn" style="background:#d32f2f;" @click="resetGame">🔄 Reset</button>
        <button class="option-btn" style="background:#ba9852;" @click="playBuzzer">🚨 Buzzer</button>
        <button class="option-btn" style="background:#1d2967;" @click="saveFullGame">💾 Save</button>
        <button class="option-btn" style="background:#1d2967;" @click="exportToJson">📤 Export</button>
    </div>

</div>

<script type="module">
    import { initialTimerData, TimerLogic } from './boardLogic.js';
    import './firebaseConfig.js';

    const { createApp } = Vue;
    createApp({
        data() {
            return {
                ...JSON.parse(JSON.stringify(initialTimerData)),
                // 팀 데이터 초기화 (HTML의 v-model과 연결)
                teamId: '',
                teamPassword: '',
                teamA: { name: 'HOME', timeout: 0 },
                teamB: { name: 'AWAY', timeout: 0 },
                teamAScore: 0,
                teamBScore: 0,
                teamAFoul: 0,
                teamBFoul: 0,
                gameInterval: null,
                shotInterval: null,
                timerInterval: null,
                gameHistory: []
            }
        },
        computed: {
            // 게임 시간을 00:00 포맷으로 변환 (UI 표시용)
            formattedGameTime() {
                return TimerLogic.formatTime(this.gameTimeSec);
            },
            // Quarter
            displayQuarter() {
                if (this.quarter <= 4) {
                    return this.quarter + "Q";
                } else {
                    return "Ex" + (this.quarter - 4); // 5Q -> Ex1, 6Q -> Ex2
                }
            },
            // 1분 미만일 때 빨간색으로 변하게 하는 로직
            isGameTimeDanger() {
                return this.gameTimeSec < 60;
            },
        },
        methods: {
        
            // --- 메인 게임 클락 제어 ---
            toggleGameClock() {
                if (this.isGameRunning) this.stopGameClock();
                else this.startGameClock();
            },
            startGameClock() {
                if (this.gameInterval) return;
                this.isGameRunning = true;
                this.gameInterval = setInterval(() => {
                    if (this.gameTimeSec > 0) this.gameTimeSec--;
                    else this.stopGameClock();
                }, 1000);
            },
            stopGameClock() {
                clearInterval(this.gameInterval);
                this.gameInterval = null;
                this.isGameRunning = false;
            },

            // --- 샷클락 제어 ---
            toggleShotClock() {
                if (this.isShotClockRunning) this.stopShotClock();
                else this.startShotClock();
            },
            startShotClock() {
                if (this.shotInterval) return;
                this.isShotClockRunning = true;
                this.shotInterval = setInterval(() => {
                    if (this.shotClock > 0) {
                        this.shotClock--;

                        if (this.shotClock <= 5 && this.shotClock > 0) {
                            this.speakNumber(this.shotClock); // 5, 4, 3, 2, 1 음성 출력
                        }
                        if (this.shotClock === 0) {
                            this.playBuzzer();    // 0이 되면 삐~ 소리
                            this.stopShotClock(); // 시계 정지
                        }
                    }
                }, 1000); // 1000ms = 1초마다 반복
            },
            stopShotClock() {
                clearInterval(this.shotInterval);
                this.shotInterval = null;
                this.isShotClockRunning = false;
            },

            // --- Modify Clock
            mdifityGameClock(sec) { // +/- 1분 기능
                const maxTime = 720; // 12분(12 * 60초)
                const newTime = this.gameTimeSec + sec;

                if (newTime >= 0 && newTime <= maxTime) {
                    this.gameTimeSec = newTime;
                } else if (newTime > maxTime) {
                    this.gameTimeSec = maxTime; // 12분을 초과하면 12분으로 고정
                }
            },
            modifyShotClock(sec) { // +/- 1초 기능
                const newTime = this.shotClock + sec;
    
                if (newTime >= 0 && newTime <= 24) {
                    this.shotClock = newTime;
                } else if (newTime > 24) {
                    this.shotClock = 24; // 24초를 초과하려고 하면 24로 고정
                }
            },
            resetShotClock(sec) {
                TimerLogic.resetShotClock(this, sec);
            },
            changeQuarter(val) {
                if (val > 0) TimerLogic.nextQuarter(this);
                else this.quarter = Math.max(1, this.quarter - 1);
            },
            nextQuarter() {
                this.saveQuarterToHistory();
                this.quarter++;
                this.teamAFoul = 0;
                this.teamBFoul = 0;
                this.gameTimeSec = 600; 
                this.shotClock = 24;
                this.stopGameClock();
                this.stopShotClock();
                // alert(`${this.displayQuarter} 시작!`);
            },

            // --- Sound --- //
            // Count down (TTS)
            speakNumber(num) {
                const message = new SpeechSynthesisUtterance(num.toString());
                message.lang = 'ko-KR'; // 한국어 설정
                message.rate = 1.5;     // 읽는 속도
                window.speechSynthesis.speak(message);
            },


            // --- 점수 및 파울 (양옆 패널) ---
            toggleTimeout(team, index) {
                const target = team === 'A' ? this.teamA : this.teamB;
                
                // 현재 켜져 있는 불을 누르면 꺼짐 (타임아웃 사용)
                if (index === target.timeout) {
                    target.timeout--;
                    this.stopTimer(); // 작전타임 시 타이머 정지 (선택 사항)
                } 
                // 바로 다음 꺼져 있는 불을 누르면 켜짐 (타임아웃 취소)
                else if (index === target.timeout + 1) {
                    target.timeout++;
                }
                // 그 외의 경우는 작동하지 않음 (순서대로 켜고 꺼야 함)
            },
            updateScore(team, val) {
                if (team === 'A') this.teamAScore = Math.max(0, this.teamAScore + val);
                else this.teamBScore = Math.max(0, this.teamBScore + val);
            },
            updateFoul(team, val) {
                if (team === 'A') {
                    // 0과 5 사이로 제한
                    const newFoul = this.teamAFoul + val;
                    if (newFoul >= 0 && newFoul <= 5) {
                        this.teamAFoul = newFoul;
                    }
                } else {
                    const newFoul = this.teamBFoul + val;
                    if (newFoul >= 0 && newFoul <= 5) {
                        this.teamBFoul = newFoul;
                    }
                }
            },

            // --- 시스템 기능 ---
            onGameEnd() { this.stopTimer(); alert("경기 종료!"); },
            onShotClockEnd() { this.stopTimer(); alert("24초 종료!"); },
            resetGame() { if(confirm("초기화할까요?")) location.reload(); },
            // Buzzer
            playBuzzer() {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();

                oscillator.type = 'square'; // 전광판 특유의 거친 소리
                oscillator.frequency.setValueAtTime(440, audioCtx.currentTime); // 주파수(음높이)
                
                gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.5);

                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);

                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 1.5); // 2초 동안 재생
            },
            
            // 쿼터 기록을 배열에 담는 내부 함수
            saveQuarterToHistory() {
                const record = {
                    quarterName: this.displayQuarter, // Ex1, 4Q 등
                    scoreA: this.teamAScore,
                    scoreB: this.teamBScore,
                    foulA: this.teamAFoul,
                    foulB: this.teamBFoul
                };
                this.gameHistory.push(record);
            },

            /* localStorage Save Option
            saveFullGame() {
                // 현재 진행 중인 마지막 쿼터 데이터까지 포함해서 저장
                const rawData = localStorage.getItem('all_basketball_games');
                let gameList = rawData ? JSON.parse(rawData) : [];

                // 저장할 현재 경기 데이터 생성
                const newGame = {
                    id: Date.now(), // 고유 ID (식별용)
                    date: new Date().toLocaleString(), // 저장 시간
                    history: this.gameHistory, // 쿼터별 상세 기록
                    finalScore: { 
                        A: this.teamAScore, 
                        B: this.teamBScore 
                    }
                };
                this.saveQuarterToHistory();
                
                gameList.push(newGame);

                // Save whole data in localStorage
                localStorage.setItem('all_basketball_games', JSON.stringify(gameList));
                
                alert(`경기가 성공적으로 저장되었습니다! (총 ${gameList.length}개의 기록 있음)`);
            },
            */
            async saveFullGame() {
                // 로그인 정보가 있는지 확인
                if (!this.teamId) {
                    alert("로그인이 필요합니다. 팀명을 확인해주세요.");
                    return;
                }
            
                // 현재 쿼터의 마지막 기록을 history 배열에 추가
                this.saveQuarterToHistory();
            
                // 서버에 저장할 데이터 뭉치 만들기
                const newGame = {
                    id: Date.now(),
                    date: new Date().toLocaleString(),
                    history: this.gameHistory,
                    finalScore: { 
                        A: this.teamAScore, 
                        B: this.teamBScore 
                    }
                };
            
                try {
                    // Firebase 서버에 저장 (경로: teams/팀명/games/게임ID)
                    const gameRef = window.dbRef(window.db, `teams/${this.teamId}/games/${newGame.id}`);
                    await window.dbSet(gameRef, newGame);
                    
                    alert(`서버 저장 완료! 팀명: ${this.teamId}`);
                } catch (error) {
                    console.error("Firebase 저장 에러:", error);
                    alert("서버 저장에 실패했습니다. 인터넷 연결을 확인하세요.");
                }
            },

            exportToJson() {
                // 저장할 데이터 구조 만들기
                const dataStr = JSON.stringify(this.gameHistory, null, 2); // 보기 좋게 정렬
                const dataBlob = new Blob([dataStr], { type: 'application/json' });
                
                // 가상의 다운로드 링크 생성
                const url = URL.createObjectURL(dataBlob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `basketball_record_${new Date().getTime()}.json`;
                
                // 클릭 및 삭제
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
            },
        },
        mounted() {
            const urlParams = new URLSearchParams(window.location.search);
            this.teamId = urlParams.get('teamId');
            this.teamPassword = urlParams.get('pw');
    
            if (this.teamId) {
                this.loadFromServer();
            }
        }
    }).mount('#app');
</script>

</body>

</html>
