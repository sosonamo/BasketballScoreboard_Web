<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>농구 점수판 Basic</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        /* 기본 설정 */
        body { background-color: #121212; margin: 0; padding: 5px; user-select: none;
            font-family: 'Arial', sans-serif;  color: white; }
        .container { max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; gap: 10px; padding-bottom: 50px;}
        
        /* 버튼 공통 */
        button { cursor: pointer; border: none; border-radius: 4px; font-weight: bold; color: white; touch-action: manipulation; }
        .btn-sm { padding: 5px 10px; font-size: 0.8rem; }
        .btn-md { padding: 10px; font-size: 1rem; }
        
        /* 1. 상단 타이머 구역 */
        .header { display: flex; justify-content: space-between; align-items: center; background: #1e1e1e; padding: 10px; border-radius: 8px; border: 1px solid #333; }
        .timer-box { text-align: center; flex-grow: 1; }
        .main-timer { font-size: 3.5rem; font-weight: bold; color: #00ff00; font-family: monospace; line-height: 1; }
        .shot-clock { font-size: 2.5rem; font-weight: bold; color: #ff3333; font-family: monospace; line-height: 1; }
        .danger-time { color: #ff0000 !important; }

        /* 2. 팀 점수판 (요약) */
        .scoreboard { display: flex; gap: 5px; }
        .team-card { flex: 1; background: #2c2c2c; padding: 10px; border-radius: 8px; text-align: center; position: relative; }
        .team-name-input { width: 100%; background: transparent; border: none; color: white; font-size: 1.2rem; font-weight: bold; text-align: center; margin-bottom: 5px; }
        .total-score { font-size: 4rem; font-weight: bold; margin: 5px 0; }
        .team-stats { display: flex; justify-content: space-around; font-size: 0.9rem; color: #ccc; margin-top: 5px; }
        .foul-box { border: 1px solid #555; padding: 2px 8px; border-radius: 4px; }
        .foul-danger { background-color: #b71c1c; color: white; border: none;}
        .timeout-dots { display: flex; gap: 3px; justify-content: center; margin-top: 5px; }
        .dot { width: 12px; height: 12px; background-color: #555; border-radius: 50%; }
        .dot.active { background-color: #ff9800; box-shadow: 0 0 5px #ff9800; }

        /* 3. 선수 명단 리스트 */
        .player-section { display: flex; gap: 5px; overflow-x: hidden; }
        .team-list { flex: 1; background: #1e1e1e; border-radius: 8px; padding: 5px; }
        .list-title { text-align: center; font-size: 0.9rem; color: #888; margin-bottom: 5px; }
        .player-row { display: flex; align-items: center; justify-content: space-between; background: #2a2a2a; margin-bottom: 4px; padding: 8px 5px; border-radius: 4px; }
        .p-info { width: 35px; font-size: 0.8rem; font-weight: bold; color: #aaa; text-align: center;}
        .p-score { width: 30px; font-size: 1.1rem; font-weight: bold; text-align: center; color: #fff; }
        .p-foul { font-size: 0.7rem; color: orange; margin-right: 5px;}
        .btn-p-group { display: flex; gap: 2px; }
        .btn-p { background: #444; color: white; font-size: 0.75rem; padding: 6px 8px; min-width: 30px; }
        .bg-blue { background: #1565c0; }
        .bg-red { background: #c62828; }

        /* 하단 컨트롤 바 (고정) */
        .controls { position: fixed; bottom: 0; left: 0; width: 100%; background: #111; padding: 10px; display: flex; justify-content: center; gap: 10px; border-top: 1px solid #333; }
        .control-btn { background: #333; padding: 10px 20px; font-size: 1rem; }
        .play-btn { background: #007bff; }
    </style>
</head>
<body>

<div id="app" class="container">
    
    <div class="header">
        <div>
            <div style="font-size:0.8rem; color:#888; text-align:center;">QUARTER</div>
            <div style="display:flex; align-items:center;">
                <button @click="changeQuarter(-1)" class="btn-sm" style="background:#444">◀</button>
                <span style="font-size:1.5rem; margin:0 10px; font-weight:bold;">{{ quarter }}Q</span>
                <button @click="changeQuarter(1)" class="btn-sm" style="background:#444">▶</button>
            </div>
        </div>
        <div class="timer-box" @click="toggleGameTimer">
            <div class="main-timer" :class="{ 'danger-time': isGameTimeDanger }">{{ formattedGameTime }}</div>
            <div v-if="isGameRunning" style="font-size:0.8rem; color:#aaa;">터치하여 일시정지</div>
        </div>
        <div style="text-align:center;">
            <div class="shot-clock" :class="{ 'danger-time': shotClock <= 5 }" @click="toggleShotClock">{{ shotClock }}</div>
            <div style="display:flex; gap:2px; margin-top:5px;">
                <button @click.stop="resetShotClock(24)" class="btn-sm" style="background:#d32f2f;">24</button>
                <button @click.stop="resetShotClock(14)" class="btn-sm" style="background:#d32f2f;">14</button>
            </div>
        </div>
    </div>

    <div class="scoreboard">
        <div class="team-card">
            <input v-model="teamA.name" class="team-name-input">
            <div class="total-score" style="color:#4fc3f7">{{ teamAScore }}</div>
            <div class="team-stats">
                <div class="foul-box" :class="{'foul-danger': teamAFoul >= 4}">
                    팀파울 {{ teamAFoul }}
                </div>
                <div @click="useTimeout('A')" style="cursor:pointer;">
                    작전타임
                    <div class="timeout-dots">
                        <div class="dot" :class="{active: teamA.timeout >= 1}"></div>
                        <div class="dot" :class="{active: teamA.timeout >= 2}"></div>
                        <div class="dot" :class="{active: teamA.timeout >= 3}"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="team-card">
            <input v-model="teamB.name" class="team-name-input">
            <div class="total-score" style="color:#ff8a65">{{ teamBScore }}</div>
            <div class="team-stats">
                <div class="foul-box" :class="{'foul-danger': teamBFoul >= 4}">
                    팀파울 {{ teamBFoul }}
                </div>
                <div @click="useTimeout('B')" style="cursor:pointer;">
                    작전타임
                    <div class="timeout-dots">
                        <div class="dot" :class="{active: teamB.timeout >= 1}"></div>
                        <div class="dot" :class="{active: teamB.timeout >= 2}"></div>
                        <div class="dot" :class="{active: teamB.timeout >= 3}"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="player-section">
        <div class="team-list">
            <div class="list-title">{{ teamA.name }} 선수 기록</div>
            <div v-for="(p, index) in teamA.players" :key="index" class="player-row">
                <div class="p-info">{{ p.number }}</div>
                <div class="p-score">{{ p.score }}</div>
                <div class="btn-p-group">
                    <button class="btn-p bg-blue" @click="addPlayerScore('A', index, 1)">+1</button>
                    <button class="btn-p bg-blue" @click="addPlayerScore('A', index, 2)">+2</button>
                    <button class="btn-p bg-blue" @click="addPlayerScore('A', index, 3)">+3</button>
                    <button class="btn-p" style="background:#555;" @click="addPlayerFoul('A', index)">P</button>
                </div>
                <div v-if="p.foul > 0" class="p-foul">P{{p.foul}}</div>
            </div>
        </div>

        <div class="team-list">
            <div class="list-title">{{ teamB.name }} 선수 기록</div>
            <div v-for="(p, index) in teamB.players" :key="index" class="player-row">
                <div class="p-info">{{ p.number }}</div>
                <div class="p-score">{{ p.score }}</div>
                <div class="btn-p-group">
                    <button class="btn-p bg-red" @click="addPlayerScore('B', index, 1)">+1</button>
                    <button class="btn-p bg-red" @click="addPlayerScore('B', index, 2)">+2</button>
                    <button class="btn-p bg-red" @click="addPlayerScore('B', index, 3)">+3</button>
                    <button class="btn-p" style="background:#555;" @click="addPlayerFoul('B', index)">P</button>
                </div>
                <div v-if="p.foul > 0" class="p-foul">P{{p.foul}}</div>
            </div>
        </div>
    </div>

    <div style="height:50px;"></div> <div class="controls">
        <button class="control-btn play-btn" @click="toggleGameTimer">
            {{ isGameRunning ? '⏸ STOP' : '▶ START' }}
        </button>
        <button class="control-btn" @click="enableSound">🔊 소리 켜기</button>
        <button class="control-btn" style="background:#d32f2f;" @click="resetGame">🔄 리셋</button>
    </div>

</div>

<script>
    const { createApp } = Vue;

    createApp({
        data() {
            return {
                quarter: 1,
                gameTimeSec: 600, 
                shotClock: 24,
                isGameRunning: false,
                isShotClockRunning: false,
                timerInterval: null,
                audioContext: null,

                // 팀 및 선수 데이터 구조 변경
                teamA: { 
                    name: 'TEAM A', 
                    timeout: 3, 
                    players: Array.from({length: 12}, (_, i) => ({ number: `A${i+1}`, score: 0, foul: 0 }))
                },
                teamB: { 
                    name: 'TEAM B', 
                    timeout: 3, 
                    players: Array.from({length: 12}, (_, i) => ({ number: `B${i+1}`, score: 0, foul: 0 }))
                }
            }
        },
        computed: {
            formattedGameTime() {
                const m = Math.floor(this.gameTimeSec / 60);
                const s = this.gameTimeSec % 60;
                return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
            },
            isGameTimeDanger() { return this.gameTimeSec <= 10 && this.gameTimeSec > 0; },
            
            // 팀 총점 자동 계산 (선수들 점수의 합)
            teamAScore() { return this.teamA.players.reduce((sum, p) => sum + p.score, 0); },
            teamBScore() { return this.teamB.players.reduce((sum, p) => sum + p.score, 0); },
            
            // 팀 파울 자동 계산
            teamAFoul() { return this.teamA.players.reduce((sum, p) => sum + p.foul, 0); },
            teamBFoul() { return this.teamB.players.reduce((sum, p) => sum + p.foul, 0); }
        },
        methods: {
            // --- 게임 로직 ---
            toggleGameTimer() {
                this.isGameRunning = !this.isGameRunning;
                if (this.isGameRunning) {
                    this.isShotClockRunning = true;
                    this.startTimer();
                } else {
                    this.isShotClockRunning = false;
                    this.stopTimer();
                }
            },
            toggleShotClock() { this.isShotClockRunning = !this.isShotClockRunning; },
            
            startTimer() {
                if (this.timerInterval) return;
                this.timerInterval = setInterval(() => {
                    if (!this.isGameRunning) return;
                    
                    if (this.gameTimeSec > 0) {
                        this.gameTimeSec--;
                        if (this.gameTimeSec > 0 && this.gameTimeSec <= 5) this.speak(this.gameTimeSec);
                    }
                    if (this.isShotClockRunning && this.shotClock > 0) this.shotClock--;
                    
                    if (this.gameTimeSec === 0 || (this.isShotClockRunning && this.shotClock === 0)) {
                        this.playBuzzer();
                        this.isGameRunning = false;
                        this.isShotClockRunning = false;
                        this.stopTimer();
                    }
                }, 1000);
            },
            stopTimer() { clearInterval(this.timerInterval); this.timerInterval = null; },

            // --- 조작 메서드 ---
            addPlayerScore(team, index, point) {
                if(team === 'A') this.teamA.players[index].score += point;
                else this.teamB.players[index].score += point;
            },
            addPlayerFoul(team, index) {
                if(team === 'A') {
                    if(this.teamA.players[index].foul < 5) this.teamA.players[index].foul++;
                } else {
                    if(this.teamB.players[index].foul < 5) this.teamB.players[index].foul++;
                }
            },
            useTimeout(team) {
                if (team === 'A' && this.teamA.timeout > 0) this.teamA.timeout--;
                if (team === 'B' && this.teamB.timeout > 0) this.teamB.timeout--;
            },
            resetShotClock(sec) {
                this.shotClock = sec;
                this.isShotClockRunning = false; 
            },
            changeQuarter(val) {
                let next = this.quarter + val;
                if (next < 1) next = 1;
                this.quarter = next;
                this.gameTimeSec = 600; 
                this.shotClock = 24;
                this.isGameRunning = false;
                this.stopTimer();
                // 쿼터 바뀌면 팀 파울용 개별 파울 리셋? 보통 누적되므로 유지. 팀파울만 리셋하려면 별도 로직 필요.
                // 여기선 단순화를 위해 유지.
            },
            resetGame() {
                if(!confirm("모든 기록을 초기화 하시겠습니까?")) return;
                this.quarter = 1;
                this.gameTimeSec = 600;
                this.shotClock = 24;
                this.isGameRunning = false;
                this.stopTimer();
                this.teamA.timeout = 3; 
                this.teamB.timeout = 3;
                // 선수 기록 초기화
                this.teamA.players.forEach(p => { p.score=0; p.foul=0; });
                this.teamB.players.forEach(p => { p.score=0; p.foul=0; });
            },

            // --- 사운드 ---
            enableSound() {
                this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                this.playBuzzer(); // 테스트용 짧은 재생
            },
            playBuzzer() {
                if (!this.audioContext) return;
                const osc = this.audioContext.createOscillator();
                const gain = this.audioContext.createGain();
                osc.type = 'square';
                osc.frequency.value = 440; 
                osc.connect(gain);
                gain.connect(this.audioContext.destination);
                osc.start();
                setTimeout(() => { osc.stop(); }, 1500);
            },
            speak(text) {
                if ('speechSynthesis' in window) {
                    const msg = new SpeechSynthesisUtterance(text);
                    msg.lang = 'en-US';
                    window.speechSynthesis.speak(msg);
                }
            }
        }
    }).mount('#app');
</script>
</body>
</html>
